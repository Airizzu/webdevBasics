<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Althea">
    <meta name="description" content="Page about a taco shop.">

    <title>LTS | Contact Us</title>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <header>
      <h1>Contact Us</h1>
      <nav aria-label="contact-navigation">
        <ul>
          <li><a href="home.html">Home</a></li>
          <li><a href="home.html#about">About LTS</a></li>
          <li><a href="home.html#menu">Our Menu</a></li>
          <li><a href="hours.html">Store Hours</a></li>
        </ul>
      </nav>

      <figure>
        <img src="img/tacos_close_up_400x260.png" alt="An image of tacos in a close up view." title="Yummy tacos!"
          width="400" height="260">

        <figcaption>
          Little Taco Shop Tacos
        </figcaption>
      </figure>
    </header>

    <main>
      <section>
        <h2> Our Contact Form</h2>

        <form action="http://httpbin.org/get" method="post">
          <fieldset>
            <legend>Send Us a Message</legend>
            <p>
              <label for="name">Name:</label>
              <input type="text" id="name" name="fullName" placeholder="your name" autocomplete="on" required autofocus>
            </p>

            <p>
              <label for="email">Email:</label>
              <input type="text" id="email" name="emailAddress" placeholder="your email" autocomplete="on" required>
            </p>

            <p>
              <label for="message">Your Message:</label>
              <br>
              <textarea name="contactMessage" id="message" cols="30" rows="10"
                placeholder="Type your message here"></textarea>
            </p>
          </fieldset>

          <button type="submit" formaction="https://httpbin.org/post" formmethod="post">Send</button>
          <button type="reset">Reset</button>

        </form>
      </section>

      <section>
        <h2>Our Location</h2>
        <address>
          555 Taco Temptation Lane, Suite T <br> Kansas City, MO 55555-5555
          <p>Phone: <a href="tel:+1234567890">555-555-5555</a></p>
        </address>
      </section>

      <a href="#">Back To Top</a>
    </main>
    <br>
    <hr>
    <footer>
      <p>Copyright &copy; The Little Taco Shop</p>
    </footer>
  </body>

</html>
